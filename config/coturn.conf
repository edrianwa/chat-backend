# coturn TURN server configuration for SecureChat
# Deploy on GCP Compute Engine with firewall rules for UDP 49152-65535

# Network
listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0
relay-ip=<EXTERNAL_IP>
external-ip=<EXTERNAL_IP>

# Auth (REST API / shared secret)
use-auth-secret
static-auth-secret=<SAME_AS_TURN_SECRET_ENV_VAR>

# Realm
realm=securechat.example.com

# TLS (Let's Encrypt)
# cert=/etc/letsencrypt/live/turn.example.com/fullchain.pem
# pkey=/etc/letsencrypt/live/turn.example.com/privkey.pem

# Relay port range (open in GCP firewall)
min-port=49152
max-port=65535

# Logging
log-file=/var/log/coturn/turnserver.log
verbose

# Performance
total-quota=100
stale-nonce=600
no-multicast-peers

# Security
no-cli
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
